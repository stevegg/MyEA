version: "3.9"

# ============================================================
# myEA — Production Docker Compose
# For local development overrides, use:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================================

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  ollama_models:
    driver: local
  whatsapp_session:
    driver: local
  files_data:
    driver: local
  skills_data:
    driver: local
  logs_data:
    driver: local
  signal_data:
    driver: local

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: myea-postgres
    restart: unless-stopped
    networks:
      - backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myea}
      # POSTGRES_PASSWORD has no default — must be set in .env to prevent running with a weak password
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-myea}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # postgres is intentionally NOT exposed on the host network.
    # Only services on the backend network can reach it.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myea} -d ${POSTGRES_DB:-myea} -q"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Ollama (local LLM) ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: myea-ollama
    # No restart policy — ollama is optional; let it stay down if no GPU/resources
    restart: "no"
    networks:
      - backend
    volumes:
      - ollama_models:/root/.ollama
    expose:
      - "11434"
    # GPU support is opt-in. Uncomment the block below if you have an NVIDIA GPU
    # and the nvidia-container-toolkit installed:
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    #     limits:
    #       memory: 8g
    #
    # For CPU-only usage, cap memory to avoid OOM on smaller machines:
    deploy:
      resources:
        limits:
          memory: 4g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ── Signal CLI REST API ─────────────────────────────────────
  signal-cli:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: myea-signal-cli
    restart: unless-stopped
    networks:
      - backend
    environment:
      - MODE=native
      - AUTO_RECEIVE_SCHEDULE=0/10 * * * * *
    volumes:
      - signal_data:/home/.local/share/signal-cli
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/about || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Backend (Fastify + Node) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: myea-backend
    restart: unless-stopped
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      signal-cli:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-myea}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-myea}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Only the bcrypt hash is passed to the container — never the plain-text password.
      # Generate with: node -e "require('bcryptjs').hash('yourpassword',12).then(console.log)"
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      # AI Providers
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434
      ACTIVE_AI_PROVIDER: ${ACTIVE_AI_PROVIDER:-claude}
      AI_MODEL: ${AI_MODEL:-claude-opus-4-5}
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      # Discord
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_ENABLED: ${DISCORD_ENABLED:-false}
      # Slack
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_ENABLED: ${SLACK_ENABLED:-false}
      # WhatsApp
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-false}
      # Signal
      SIGNAL_PHONE_NUMBER: ${SIGNAL_PHONE_NUMBER:-}
      SIGNAL_CLI_URL: http://signal-cli:8080
      SIGNAL_ENABLED: ${SIGNAL_ENABLED:-false}
      # Gmail OAuth2
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REDIRECT_URI: ${GMAIL_REDIRECT_URI:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      GMAIL_ENABLED: ${GMAIL_ENABLED:-false}
      # GitHub
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_ENABLED: ${GITHUB_ENABLED:-false}
      # Spotify
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-}
      SPOTIFY_REFRESH_TOKEN: ${SPOTIFY_REFRESH_TOKEN:-}
      SPOTIFY_ENABLED: ${SPOTIFY_ENABLED:-false}
      # Smart Home
      HOME_ASSISTANT_URL: ${HOME_ASSISTANT_URL:-}
      HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN:-}
      SMART_HOME_ENABLED: ${SMART_HOME_ENABLED:-false}
      # Volume paths (inside container)
      SKILLS_DIR: /app/volumes/skills
      FILES_DIR: /app/volumes/files
      LOGS_DIR: /app/volumes/logs
      # Server
      BACKEND_PORT: ${BACKEND_PORT:-3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - skills_data:/app/volumes/skills
      - files_data:/app/volumes/files
      - logs_data:/app/volumes/logs
      - whatsapp_session:/app/volumes/whatsapp
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g

  # ── Frontend (nginx SPA) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3001}
    container_name: myea-frontend
    restart: unless-stopped
    networks:
      - frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128m
