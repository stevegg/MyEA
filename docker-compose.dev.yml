version: "3.9"

# ============================================================
# myEA — Development Overrides
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Or simply:
#   make dev
#
# This file:
#   - Mounts source code for hot-reload
#   - Switches backend to ts-node-dev (no build step)
#   - Switches frontend to the Vite dev server
#   - Exposes postgres on the host for direct psql access
#   - Disables resource limits (let the host manage them)
# ============================================================

services:
  # ── PostgreSQL (expose for local tooling) ──────────────────
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    deploy:
      resources:
        limits:
          memory: "0"

  # ── Backend (hot-reload via tsx watch) ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    environment:
      NODE_ENV: development
    volumes:
      # Mount source for hot-reload; node_modules stays inside the container
      - ./backend/src:/app/src:delegated
      - ./backend/drizzle:/app/drizzle:delegated
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      # Named volumes for runtime data (same as prod)
      - skills_data:/app/volumes/skills
      - files_data:/app/volumes/files
      - logs_data:/app/volumes/logs
      - whatsapp_session:/app/volumes/whatsapp
    command: ["./entrypoint.sh"]
    deploy:
      resources:
        limits:
          memory: "0"

  # ── Frontend (Vite dev server with HMR) ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: on-failure
    environment:
      NODE_ENV: development
      # Inside the container the backend is reachable via the Docker service name.
      # These are hardcoded (not shell-interpolated) so the Makefile's `export`
      # of VITE_API_URL=http://localhost:3001 from .env doesn't override them.
      VITE_API_URL: "http://backend:3001"
      VITE_WS_URL: "ws://backend:3001"
      VITE_PORT: "5173"
      VITE_HMR_CLIENT_PORT: ${FRONTEND_PORT:-3000}
    volumes:
      # Mount source; node_modules stays inside the container
      - ./frontend/src:/app/src:delegated
      - ./frontend/public:/app/public:delegated
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json:ro
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
    ports:
      - "${FRONTEND_PORT:-3000}:5173"
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: "0"  # no limit in dev (prod sets 128m which OOM-kills Vite+esbuild)

  # ── Ollama (no resource cap in dev) ────────────────────────
  ollama:
    ports:
      - "11434:11434"
    deploy:
      resources:
        limits:
          memory: "0"
