server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Cache: immutable static assets (JS/CSS with content hashes) ──
    location ~* \.(js|css|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ── Cache: images and media ───────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── No-cache: index.html (SPA shell must always be fresh) ─
    location = /index.html {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── No-cache: manifest and service worker ────────────────
    location ~* \.(webmanifest|manifest\.json|sw\.js)$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── SPA fallback — all unmatched routes return index.html ─
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Hide nginx version ────────────────────────────────────
    server_tokens off;
}
